name: Kong Spec Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  spec-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kong
          POSTGRES_PASSWORD: kong
          POSTGRES_DB: kong_tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev \
            libpq-dev \
            libluajit-5.1-dev \
            pkg-config \
            build-essential \
            cmake \
            protobuf-compiler \
            luarocks \
            postgresql-client

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup busted
        run: bash scripts/setup-busted.sh

      - name: Build kong-rust
        run: cargo build

      - name: Bootstrap database
        env:
          KONG_PG_HOST: 127.0.0.1
          KONG_PG_PORT: "5432"
          KONG_PG_USER: kong
          KONG_PG_PASSWORD: kong
          KONG_PG_DATABASE: kong_tests
        run: ./target/debug/kong db bootstrap

      - name: Run spec tests
        env:
          KONG_SPEC_TEST_PG_HOST: 127.0.0.1
          KONG_SPEC_TEST_PG_PORT: "5432"
          KONG_SPEC_TEST_PG_USER: kong
          KONG_SPEC_TEST_PG_PASSWORD: kong
          KONG_SPEC_TEST_PG_DATABASE: kong_tests
        run: |
          # Run verified spec files individually — 逐个运行已验证的 spec 文件
          SPECS=(
            spec/02-integration/04-admin_api/02-kong_routes_spec.lua
            spec/02-integration/04-admin_api/03-consumers_routes_spec.lua
            spec/02-integration/04-admin_api/04-plugins_routes_spec.lua
            spec/02-integration/04-admin_api/06-certificates_routes_spec.lua
            spec/02-integration/04-admin_api/07-upstreams_routes_spec.lua
            spec/02-integration/04-admin_api/08-targets_routes_spec.lua
            spec/02-integration/04-admin_api/09-routes_routes_spec.lua
            spec/02-integration/04-admin_api/10-services_routes_spec.lua
            spec/02-integration/04-admin_api/14-tags_spec.lua
            spec/02-integration/04-admin_api/16-ca_certificates_routes_spec.lua
            spec/02-integration/05-proxy/08-uri_encoding_spec.lua
            spec/02-integration/05-proxy/24-buffered_spec.lua
            spec/02-integration/05-proxy/33-request-id-header_spec.lua
            spec/02-integration/08-status_api/01-core_routes_spec.lua
            spec/02-integration/08-status_api/03-readiness_endpoint_spec.lua
            spec/03-plugins/14-request-termination/02-access_spec.lua
            spec/03-plugins/15-response-transformer/03-api_spec.lua
            spec/03-plugins/23-rate-limiting/03-api_spec.lua
            spec/03-plugins/36-request-transformer/03-api_spec.lua
          )
          FAILED=0
          for spec in "${SPECS[@]}"; do
            echo "=== Running: $spec ==="
            # Kill any leftover Kong processes between specs — 清理 spec 之间残留的 Kong 进程
            pkill -f 'target/debug/kong' 2>/dev/null || true
            sleep 2
            if ! bash scripts/run-specs.sh "$spec"; then
              echo "FAILED: $spec"
              FAILED=$((FAILED + 1))
            fi
          done
          # Final cleanup — 最终清理
          pkill -f 'target/debug/kong' 2>/dev/null || true
          if [ $FAILED -gt 0 ]; then
            echo "=== $FAILED spec(s) failed ==="
            exit 1
          fi
          echo "=== All specs passed ==="
